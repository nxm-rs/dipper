# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Scope: advisory hygiene plus license and source allow-lists for the dipper
# CLI. The advisory ignore list mirrors .cargo/audit.toml so `cargo audit` and
# `cargo deny check advisories` agree.

[advisories]
# Fail on any advisory that is not explicitly ignored below.
yanked = "deny"
ignore = [
    # All three entries are build-time-only, transitive dependencies pulled in
    # through the alloy stack. None are direct dipper dependencies, none are
    # reachable at runtime, and none have a released upstream version that drops
    # them yet. Revisit on each alloy bump.

    # derivative unmaintained. Optional ark-ff dep of ruint, not enabled by the
    # feature set alloy-primitives requests, so not in the resolved build graph.
    # Tracking: nxm-rs/nectar#19.
    "RUSTSEC-2024-0388",

    # paste unmaintained (archived). Compile-time proc-macro dep of
    # alloy-sol-macro-input / syn-solidity. Latest released alloy-core (1.6.0)
    # still depends on it. Tracking: nxm-rs/nectar#20.
    "RUSTSEC-2024-0436",

    # proc-macro-error2 unmaintained. Compile-time proc-macro dep of
    # alloy-sol-macro / alloy-sol-macro-expander. alloy-core main has migrated to
    # proc-macro-error3 but there is no released version to bump to.
    "RUSTSEC-2026-0173",
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0", # webpki-roots (Mozilla CA bundle) via the alloy HTTP transport
]

[bans]
# Duplicate-version warnings are informational only. The duplicate rand /
# getrandom / strum graphs come from the alloy stack and are out of scope for
# advisory hygiene.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# nectar is consumed from crates.io, so dipper has no git dependencies.
allow-git = []
